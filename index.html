<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>studioHATCH Flow</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#26215c">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="HATCH Flow">
<link rel="apple-touch-icon" href="icon-180.png">
<link rel="icon" href="icon.svg" type="image/svg+xml">
<style>
  :root {
    --bg: #f6f5f1;
    --surface: #ffffff;
    --surface-2: #f1efe8;
    --text: #26251f;
    --text-2: #6b6a62;
    --text-3: #9c9b92;
    --border: #e4e2d9;
    --border-2: #cfcdc2;
    --accent: #26215c;
    --radius: 10px;
    --shadow: 0 1px 2px rgba(0,0,0,0.04), 0 4px 12px rgba(0,0,0,0.05);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    -webkit-font-smoothing: antialiased;
  }
  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 14px 22px;
    padding-top: calc(14px + env(safe-area-inset-top));
    display: flex; align-items: center; justify-content: space-between;
    position: sticky; top: 0; z-index: 20;
  }
  .brand { display: flex; align-items: center; gap: 10px; }
  .brand .dot {
    width: 26px; height: 26px; border-radius: 7px;
    background: var(--accent); color: #fff;
    display: flex; align-items: center; justify-content: center;
    font-weight: 700; font-size: 14px;
  }
  .brand h1 { font-size: 17px; font-weight: 600; letter-spacing: -0.01em; }
  .brand small { color: var(--text-3); font-size: 12px; font-weight: 400; margin-left: 2px; }
  .btn {
    border: 1px solid var(--border-2); background: var(--surface);
    color: var(--text); padding: 8px 14px; border-radius: 8px;
    font-size: 14px; cursor: pointer; font-weight: 500;
    display: inline-flex; align-items: center; gap: 6px;
    transition: background .12s, border-color .12s;
  }
  .btn:hover { background: var(--surface-2); }
  .btn:active { transform: scale(.985); }
  .btn-primary { background: var(--accent); color: #fff; border-color: var(--accent); }
  .btn-primary:hover { background: #1c184a; }

  .me { display:flex; align-items:center; gap:8px; }
  .me .name { font-size: 13px; color: var(--text-2); }
  .me .out { font-size: 12px; color: var(--text-3); background:none; border:none; cursor:pointer; text-decoration: underline; }

  .toolbar {
    padding: 14px 22px 4px;
    display: flex; flex-wrap: wrap; gap: 10px; align-items: center;
  }
  .chips { display: flex; gap: 6px; flex-wrap: wrap; }
  .chip {
    border: 1px solid var(--border); background: var(--surface);
    color: var(--text-2); padding: 5px 12px; border-radius: 999px;
    font-size: 13px; cursor: pointer; user-select: none; transition: all .12s;
  }
  .chip:hover { border-color: var(--border-2); }
  .chip.active { background: var(--text); color: #fff; border-color: var(--text); }
  .chip .swatch { display:inline-block; width:8px; height:8px; border-radius:50%; margin-right:6px; }
  .toolbar select {
    border: 1px solid var(--border); background: var(--surface);
    padding: 6px 10px; border-radius: 8px; font-size: 13px; color: var(--text); cursor: pointer;
  }
  .spacer { flex: 1; }
  .viewtoggle { display: inline-flex; background: var(--surface-2); border-radius: 8px; padding: 2px; }
  .viewtoggle .vt {
    border: none; background: none; padding: 6px 13px; border-radius: 6px;
    font-size: 13px; color: var(--text-2); cursor: pointer; font-weight: 500;
  }
  .viewtoggle .vt.active { background: var(--surface); color: var(--text); box-shadow: var(--shadow); }

  .board { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; padding: 14px 22px 40px; align-items: start; }

  .listwrap { padding: 14px 22px 40px; }
  table.list { width: 100%; border-collapse: collapse; background: var(--surface);
    border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
  table.list th { text-align: left; font-size: 12px; color: var(--text-2); font-weight: 600;
    padding: 11px 12px; border-bottom: 1px solid var(--border); background: var(--surface-2); white-space: nowrap; }
  table.list td { padding: 10px 12px; font-size: 13px; border-bottom: 1px solid var(--border); vertical-align: middle; }
  table.list tr:last-child td { border-bottom: none; }
  table.list tbody tr { cursor: pointer; }
  table.list tbody tr:hover { background: var(--surface-2); }
  table.list .pill { font-size: 11px; padding: 2px 9px; border-radius: 999px; white-space: nowrap; }
  table.list .st { font-size: 12px; color: var(--text-2); }
  .list-empty { padding: 30px; text-align: center; color: var(--text-3); font-size: 13px; }
  .td-overdue { color: #c0392b; font-weight: 600; }
  .stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 16px; }
  .stat { background: var(--surface-2); border-radius: var(--radius); padding: 14px 16px; display: flex; flex-direction: column; gap: 3px; }
  .stat .n { font-size: 24px; font-weight: 600; line-height: 1.1; }
  .stat .l { font-size: 12px; color: var(--text-2); }
  .stat.danger .n { color: #c0392b; }
  @media (max-width: 760px) { .stats { grid-template-columns: repeat(2, 1fr); } }

  .col { background: rgba(0,0,0,0.025); border-radius: var(--radius); padding: 8px; min-height: 120px; }
  .col-head { display: flex; align-items: center; justify-content: space-between;
    padding: 6px 8px 10px; font-size: 13px; font-weight: 600; color: var(--text-2); }
  .col-head .count { background: var(--surface); color: var(--text-3); border: 1px solid var(--border);
    border-radius: 999px; min-width: 22px; text-align: center; font-size: 12px; padding: 1px 7px; }
  .col.drag-over { background: rgba(38,33,92,0.07); outline: 2px dashed var(--border-2); outline-offset: -4px; }

  .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
    padding: 11px 12px; margin-bottom: 8px; cursor: grab; box-shadow: var(--shadow);
    transition: border-color .12s, transform .05s; }
  .card:hover { border-color: var(--border-2); }
  .card:active { cursor: grabbing; }
  .card.dragging { opacity: .4; }
  .card .tag { display: inline-block; font-size: 11px; padding: 2px 9px; border-radius: 999px; margin-bottom: 7px; font-weight: 500; }
  .card .title { font-size: 13.5px; line-height: 1.4; }
  .card .title.done { text-decoration: line-through; color: var(--text-3); }
  .card .meta { display: flex; align-items: center; justify-content: space-between; margin-top: 10px; }
  .avatars { display: flex; }
  .avatar { width: 23px; height: 23px; border-radius: 50%; display: flex; align-items: center; justify-content: center;
    font-size: 10px; font-weight: 600; color: #fff; border: 2px solid var(--surface); }
  .avatar + .avatar { margin-left: -7px; }
  .due { font-size: 11px; color: var(--text-3); display: flex; align-items: center; gap: 3px; }
  .due.overdue { color: #c0392b; font-weight: 600; }
  .empty-col { color: var(--text-3); font-size: 12px; text-align: center; padding: 16px 0; }

  .overlay { position: fixed; inset: 0; background: rgba(20,18,12,0.4); display: none;
    align-items: center; justify-content: center; z-index: 50; padding: 20px; }
  .overlay.show { display: flex; }
  .modal { background: var(--surface); border-radius: 14px; width: 100%; max-width: 480px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.25); max-height: 90vh; overflow-y: auto; }
  .modal-head { padding: 18px 20px 4px; display:flex; align-items:center; justify-content: space-between; }
  .modal-head h2 { font-size: 17px; font-weight: 600; }
  .modal-body { padding: 14px 20px 4px; }
  .modal-foot { padding: 14px 20px 18px; display: flex; gap: 8px; justify-content: space-between; align-items:center; }
  .field { margin-bottom: 13px; }
  .field label { display: block; font-size: 12px; color: var(--text-2); margin-bottom: 5px; font-weight: 500; }
  .field input, .field select, .field textarea { width: 100%; border: 1px solid var(--border-2); border-radius: 8px;
    padding: 9px 11px; font-size: 16px; color: var(--text); background: var(--surface); font-family: inherit; }
  .field input:focus, .field select:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px rgba(38,33,92,0.12); }
  .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .icon-btn { background: none; border: none; cursor: pointer; color: var(--text-3); font-size: 22px; line-height: 1; padding: 2px 6px; }
  .icon-btn:hover { color: var(--text); }
  .link-danger { background:none; border:none; color:#c0392b; cursor:pointer; font-size:13px; }
  .link-danger:hover { text-decoration: underline; }

  /* login gate */
  #login { position: fixed; inset: 0; background: var(--bg); display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 18px; z-index: 100; padding: 24px; text-align: center; }
  #login .logo { width: 64px; height: 64px; border-radius: 16px; background: var(--accent); color: #fff;
    display: flex; align-items: center; justify-content: center; font-size: 30px; font-weight: 700; }
  #login h1 { font-size: 22px; font-weight: 600; }
  #login p { color: var(--text-2); font-size: 14px; max-width: 280px; }
  .gbtn { display: inline-flex; align-items: center; gap: 10px; background: #fff; color: #3c4043;
    border: 1px solid var(--border-2); border-radius: 10px; padding: 12px 20px; font-size: 15px;
    font-weight: 500; cursor: pointer; box-shadow: var(--shadow); }
  .gbtn:hover { background: #fafafa; }
  .gbtn svg { width: 20px; height: 20px; }
  #login .err { color:#c0392b; font-size:13px; min-height:16px; }

  /* app hidden until logged in */
  body:not(.authed) #app { display: none; }
  body.authed #login { display: none; }
  #boot { position: fixed; inset:0; display:flex; align-items:center; justify-content:center; color:var(--text-3); font-size:14px; z-index:200; background:var(--bg); }

  @media (max-width: 760px) {
    .board { grid-template-columns: 1fr; }
    .row2 { grid-template-columns: 1fr; }
    header { padding-left: 16px; padding-right: 16px; }
    .toolbar { padding-left: 16px; padding-right: 16px; }
    .board, .listwrap { padding-left: 16px; padding-right: 16px; }
  }
</style>
</head>
<body>

<div id="boot">Yükleniyor…</div>

<!-- LOGIN -->
<div id="login" style="display:none;">
  <div class="logo">H</div>
  <h1>studioHATCH Flow</h1>
  <p>Ekip iş takibi. Devam etmek için Google hesabınla giriş yap.</p>
  <button class="gbtn" onclick="signIn()">
    <svg viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
    Google ile giriş yap
  </button>
  <div class="err" id="loginErr"></div>
</div>

<!-- APP -->
<div id="app">
<header>
  <div class="brand">
    <div class="dot">H</div>
    <div><h1>studioHATCH Flow <small>iş takip</small></h1></div>
  </div>
  <div style="display:flex; gap:8px; align-items:center;">
    <div class="me"><span class="name" id="meName"></span><button class="out" onclick="signOut()">çıkış</button></div>
    <button class="btn" onclick="openPeople()"><span style="font-size:15px">👥</span> Kişiler</button>
    <button class="btn btn-primary" onclick="openNew()">+ Yeni iş</button>
  </div>
</header>

<div class="toolbar">
  <div class="chips" id="lineChips"></div>
  <div class="spacer"></div>
  <div class="viewtoggle">
    <button class="vt" id="vtMine" onclick="setView('mine')">Görevlerim</button>
    <button class="vt active" id="vtKanban" onclick="setView('kanban')">Kanban</button>
    <button class="vt" id="vtList" onclick="setView('list')">Liste</button>
  </div>
  <select id="personFilter" onchange="render()"><option value="">Herkes</option></select>
  <button class="btn" onclick="exportExcel()"><span style="font-size:14px">⬇</span> Excel'e aktar</button>
</div>

<div id="board"></div>
</div><!-- /app -->

<!-- Task modal -->
<div class="overlay" id="overlay">
  <div class="modal">
    <div class="modal-head"><h2 id="modalTitle">Yeni iş</h2><button class="icon-btn" onclick="closeModal()">&times;</button></div>
    <div class="modal-body">
      <div class="field"><label>Başlık</label><input id="f_title" placeholder="ör. Sponsoru ara, afişi tasarla..."></div>
      <div class="field"><label>Açıklama</label><textarea id="f_desc" rows="3" placeholder="Detay, notlar... (karta tıklayınca görünür)" style="resize:vertical; min-height:64px; line-height:1.5;"></textarea></div>
      <div class="row2">
        <div class="field"><label>İş kolu</label><select id="f_line"></select></div>
        <div class="field"><label>Durum</label><select id="f_status"></select></div>
      </div>
      <div class="field"><label>Yönetici</label><select id="f_manager"></select></div>
      <div class="row2">
        <div class="field"><label>Ana sorumlu</label><select id="f_owner"></select></div>
        <div class="field"><label>Yardımcı sorumlu</label><select id="f_helper"></select></div>
      </div>
      <div class="row2">
        <div class="field"><label>İlk tarih</label><input id="f_start" type="date"></div>
        <div class="field"><label>Son tarih</label><input id="f_end" type="date"></div>
      </div>
    </div>
    <div class="modal-foot">
      <button class="link-danger" id="deleteBtn" onclick="deleteTask()">Sil</button>
      <div style="display:flex; gap:8px;">
        <button class="btn" onclick="closeModal()">Vazgeç</button>
        <button class="btn btn-primary" id="saveBtn" onclick="saveTask()">Kaydet</button>
      </div>
    </div>
  </div>
</div>

<!-- People modal -->
<div class="overlay" id="peopleOverlay">
  <div class="modal" style="max-width: 380px;">
    <div class="modal-head"><h2>Kişiler</h2><button class="icon-btn" onclick="closePeople()">&times;</button></div>
    <div class="modal-body">
      <div style="display:flex; gap:8px; margin-bottom:12px;">
        <input id="newPerson" placeholder="Ad soyad ekle" style="flex:1; border:1px solid var(--border-2); border-radius:8px; padding:9px 11px; font-size:16px; font-family:inherit;" onkeydown="if(event.key==='Enter')addPerson()">
        <button class="btn btn-primary" onclick="addPerson()">Ekle</button>
      </div>
      <div id="peopleList2"></div>
    </div>
    <div class="modal-foot" style="justify-content:flex-end;"><button class="btn" onclick="closePeople()">Kapat</button></div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SUPABASE_URL = "https://uolmzykwvizhmycgymfi.supabase.co";
const SUPABASE_KEY = "sb_publishable_FIJ8mhgoXzlbhtlebcc_Bw_WLHYNFI0";
const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY, {
  auth: { persistSession: true, autoRefreshToken: true, detectSessionInUrl: true }
});

const LINES = {
  "Immersive":   { bg:"#E6F1FB", fg:"#185FA5", av:"#378ADD" },
  "Dijital Art": { bg:"#FBEAF0", fg:"#993556", av:"#D4537E" },
  "hatch Shop":  { bg:"#E1F5EE", fg:"#0F6E56", av:"#1D9E75" },
  "İnşaat":      { bg:"#FAECE7", fg:"#993C1D", av:"#D85A30" },
};
const STATUSES = ["Yapılacak", "Devam ediyor", "Tamamlandı"];

let tasks = [];
let peopleRows = [];          // {id, ad, user_id}
let activeLine = "";
let viewMode = "kanban";
let editingId = null;
let me = null;
let myName = "";

/* ---------- AUTH ---------- */
async function signIn() {
  document.getElementById("loginErr").textContent = "";
  const { error } = await sb.auth.signInWithOAuth({
    provider: "google",
    options: { redirectTo: window.location.href.split("#")[0] }
  });
  if (error) document.getElementById("loginErr").textContent = "Giriş hatası: " + error.message;
}
async function signOut() { await sb.auth.signOut(); location.reload(); }

async function boot() {
  const { data: { session } } = await sb.auth.getSession();
  document.getElementById("boot").style.display = "none";
  if (!session) { document.getElementById("login").style.display = "flex"; return; }
  me = session.user;
  myName = me.user_metadata?.full_name || me.user_metadata?.name || me.email;
  document.getElementById("meName").textContent = myName;
  document.body.classList.add("authed");
  buildChips();
  await Promise.all([loadPeople(), loadTasks()]);
  subscribe();
}
sb.auth.onAuthStateChange((event) => {
  if (event === "SIGNED_IN" && !document.body.classList.contains("authed")) boot();
});

/* ---------- DATA ---------- */
function rowToTask(r){
  return { id:r.id, title:r.baslik||"", desc:r.aciklama||"", line:r.is_kolu||"", status:r.durum||"Yapılacak",
    manager:r.yonetici||"", owner:r.ana_sorumlu||"", helper:r.yardimci_sorumlu||"",
    start:r.ilk_tarih||"", end:r.son_tarih||"" };
}
function taskToRow(d){
  return { baslik:d.title, aciklama:d.desc||null, is_kolu:d.line, durum:d.status,
    yonetici:d.manager||null, ana_sorumlu:d.owner||null, yardimci_sorumlu:d.helper||null,
    ilk_tarih:d.start||null, son_tarih:d.end||null };
}
async function loadTasks(){
  const { data, error } = await sb.from("isler").select("*").order("created_at", { ascending: true });
  if (error) { console.error(error); alert("İşler yüklenemedi: " + error.message); return; }
  tasks = (data||[]).map(rowToTask);
  render();
}
async function loadPeople(){
  const { data, error } = await sb.from("kisiler").select("*").order("ad", { ascending: true });
  if (error) { console.error(error); return; }
  peopleRows = data || [];
  refreshPeople();
}
function subscribe(){
  sb.channel("flow")
    .on("postgres_changes", { event:"*", schema:"public", table:"isler" }, loadTasks)
    .on("postgres_changes", { event:"*", schema:"public", table:"kisiler" }, loadPeople)
    .subscribe();
}

/* ---------- helpers ---------- */
function peopleNames(){ return peopleRows.map(p=>p.ad).sort((a,b)=>a.localeCompare(b,"tr")); }
function initials(name){ if(!name) return "?"; return name.trim().split(/\s+/).map(w=>w[0]).slice(0,2).join("").toUpperCase(); }
function fmtDate(d){ if(!d) return ""; const m=["Oca","Şub","Mar","Nis","May","Haz","Tem","Ağu","Eyl","Eki","Kas","Ara"]; const t=new Date(d+"T00:00:00"); return t.getDate()+" "+m[t.getMonth()]; }
function fmtFull(d){ if(!d) return ""; const t=new Date(d+"T00:00:00"); return String(t.getDate()).padStart(2,"0")+"."+String(t.getMonth()+1).padStart(2,"0")+"."+t.getFullYear(); }
function isOverdue(d,s){ if(!d||s==="Tamamlandı") return false; return new Date(d+"T23:59:59") < new Date(); }
function escapeHtml(s){ return (s||"").replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c])); }

function buildChips(){
  const el=document.getElementById("lineChips");
  let html=`<div class="chip ${activeLine===""?"active":""}" onclick="setLine('')">Tümü</div>`;
  for(const name in LINES){ html+=`<div class="chip ${activeLine===name?"active":""}" onclick="setLine('${name}')"><span class="swatch" style="background:${LINES[name].av}"></span>${name}</div>`; }
  el.innerHTML=html;
}
function setLine(l){ activeLine=l; buildChips(); render(); }
function refreshPeople(){
  const ppl=peopleNames();
  const sel=document.getElementById("personFilter"); const cur=sel.value;
  sel.innerHTML=`<option value="">Herkes</option>`+ppl.map(p=>`<option>${escapeHtml(p)}</option>`).join("");
  sel.value=cur;
}
function visibleTasks(){
  const person=document.getElementById("personFilter").value;
  let v=tasks.filter(t=>(!activeLine||t.line===activeLine));
  if(person) v=v.filter(t=>[t.manager,t.owner,t.helper].includes(person));
  return v;
}
function render(){
  const board=document.getElementById("board");
  const visible=visibleTasks();
  if(viewMode==="mine"){ board.className=""; renderMine(board); return; }
  if(viewMode==="list"){ board.className=""; renderList(board,visible); return; }
  board.className="board";
  board.innerHTML=STATUSES.map(st=>{
    const items=visible.filter(t=>t.status===st);
    const cards=items.map(cardHtml).join("")||`<div class="empty-col">— boş —</div>`;
    return `<div class="col" data-status="${st}" ondragover="onDragOver(event)" ondragleave="onDragLeave(event)" ondrop="onDrop(event,'${st}')">
      <div class="col-head"><span>${st}</span><span class="count">${items.length}</span></div>${cards}</div>`;
  }).join("");
}
function listTableHtml(items){
  if(!items.length) return `<div class="list-empty">— gösterilecek iş yok —</div>`;
  const rows=items.map(t=>{
    const L=LINES[t.line]||{bg:"#eee",fg:"#555"}; const overdue=isOverdue(t.end,t.status);
    return `<tr onclick="openEdit('${t.id}')"><td>${escapeHtml(t.title)}</td>
      <td><span class="pill" style="background:${L.bg};color:${L.fg}">${t.line}</span></td>
      <td class="st">${t.status}</td><td>${escapeHtml(t.manager)||"—"}</td>
      <td>${escapeHtml(t.owner)||"—"}</td><td>${escapeHtml(t.helper)||"—"}</td>
      <td>${t.start?fmtFull(t.start):"—"}</td><td class="${overdue?'td-overdue':''}">${t.end?fmtFull(t.end):"—"}</td></tr>`;
  }).join("");
  return `<table class="list"><thead><tr>
    <th>Başlık</th><th>İş kolu</th><th>Durum</th><th>Yönetici</th><th>Ana sorumlu</th><th>Yardımcı</th><th>İlk tarih</th><th>Son tarih</th>
    </tr></thead><tbody>${rows}</tbody></table>`;
}
function renderList(board,visible){ board.innerHTML=`<div class="listwrap">${listTableHtml(visible)}</div>`; }

function renderMine(board){
  let mine = tasks.filter(t => myName && [t.manager,t.owner,t.helper].includes(myName));
  if(activeLine) mine = mine.filter(t=>t.line===activeLine);
  const yap=mine.filter(t=>t.status==="Yapılacak").length;
  const dev=mine.filter(t=>t.status==="Devam ediyor").length;
  const done=mine.filter(t=>t.status==="Tamamlandı").length;
  const gec=mine.filter(t=>isOverdue(t.end,t.status)).length;
  board.innerHTML=`<div class="listwrap">
    <div style="font-size:15px; font-weight:600; margin-bottom:12px;">Görevlerim <span style="color:var(--text-3); font-weight:400;">· ${escapeHtml(myName)}</span></div>
    <div class="stats">
      <div class="stat"><span class="n">${mine.length}</span><span class="l">Toplam</span></div>
      <div class="stat"><span class="n">${yap}</span><span class="l">Yapılacak</span></div>
      <div class="stat"><span class="n">${dev}</span><span class="l">Devam ediyor</span></div>
      <div class="stat${gec?' danger':''}"><span class="n">${gec}</span><span class="l">Geciken</span></div>
    </div>
    ${listTableHtml(mine)}
  </div>`;
}
function setView(m){ viewMode=m;
  document.getElementById("vtMine").classList.toggle("active",m==="mine");
  document.getElementById("vtKanban").classList.toggle("active",m==="kanban");
  document.getElementById("vtList").classList.toggle("active",m==="list");
  render(); }
function cardHtml(t){
  const L=LINES[t.line]||{bg:"#eee",fg:"#555",av:"#999"};
  const ppl=[t.owner,t.helper].filter(Boolean);
  const avatars=ppl.map(p=>`<span class="avatar" style="background:${L.av}" title="${escapeHtml(p)}">${initials(p)}</span>`).join("");
  const overdue=isOverdue(t.end,t.status);
  const due=t.end?`<span class="due ${overdue?"overdue":""}">${overdue?"⚠ ":"📅 "}${fmtDate(t.end)}</span>`:"";
  return `<div class="card" draggable="true" data-id="${t.id}" ondragstart="onDragStart(event,'${t.id}')" ondragend="onDragEnd(event)" onclick="openEdit('${t.id}')">
    <span class="tag" style="background:${L.bg};color:${L.fg}">${t.line}</span>
    <div class="title ${t.status==='Tamamlandı'?'done':''}">${escapeHtml(t.title)}</div>
    <div class="meta"><div class="avatars">${avatars||""}</div>${due}</div></div>`;
}

/* drag & drop */
let dragId=null;
function onDragStart(e,id){ dragId=id; e.currentTarget.classList.add("dragging"); e.dataTransfer.effectAllowed="move"; }
function onDragEnd(e){ e.currentTarget.classList.remove("dragging"); }
function onDragOver(e){ e.preventDefault(); e.currentTarget.classList.add("drag-over"); }
function onDragLeave(e){ e.currentTarget.classList.remove("drag-over"); }
async function onDrop(e,status){
  e.preventDefault(); e.currentTarget.classList.remove("drag-over");
  const t=tasks.find(x=>x.id===dragId); dragId=null;
  if(t && t.status!==status){ t.status=status; render();
    const { error } = await sb.from("isler").update({ durum:status }).eq("id", t.id);
    if(error){ alert("Güncellenemedi: "+error.message); loadTasks(); }
  }
}

/* modal */
function fillSelects(){
  document.getElementById("f_line").innerHTML=Object.keys(LINES).map(l=>`<option>${l}</option>`).join("");
  document.getElementById("f_status").innerHTML=STATUSES.map(s=>`<option>${s}</option>`).join("");
  const opts=`<option value="">— seç —</option>`+peopleNames().map(p=>`<option>${escapeHtml(p)}</option>`).join("");
  ["f_manager","f_owner","f_helper"].forEach(id=>document.getElementById(id).innerHTML=opts);
}
function openNew(){
  editingId=null; document.getElementById("modalTitle").textContent="Yeni iş";
  document.getElementById("deleteBtn").style.display="none"; fillSelects();
  set("f_title",""); set("f_desc",""); set("f_line",activeLine||"Immersive"); set("f_status","Yapılacak");
  set("f_manager",""); set("f_owner",""); set("f_helper",""); set("f_start",""); set("f_end","");
  showModal();
}
function openEdit(id){
  const t=tasks.find(x=>x.id===id); if(!t) return;
  editingId=id; document.getElementById("modalTitle").textContent="İşi düzenle";
  document.getElementById("deleteBtn").style.display="inline"; fillSelects();
  set("f_title",t.title); set("f_desc",t.desc); set("f_line",t.line); set("f_status",t.status);
  set("f_manager",t.manager); set("f_owner",t.owner); set("f_helper",t.helper);
  set("f_start",t.start); set("f_end",t.end);
  showModal();
}
function set(id,v){ document.getElementById(id).value=v||""; }
function get(id){ return document.getElementById(id).value.trim(); }
function showModal(){ document.getElementById("overlay").classList.add("show"); setTimeout(()=>document.getElementById("f_title").focus(),50); }
function closeModal(){ document.getElementById("overlay").classList.remove("show"); }

async function saveTask(){
  const title=get("f_title"); if(!title){ document.getElementById("f_title").focus(); return; }
  const data={ title, desc:get("f_desc"), line:get("f_line"), status:get("f_status"), manager:get("f_manager"),
    owner:get("f_owner"), helper:get("f_helper"), start:get("f_start"), end:get("f_end") };
  const btn=document.getElementById("saveBtn"); btn.disabled=true;
  let error;
  if(editingId){ ({ error } = await sb.from("isler").update(taskToRow(data)).eq("id", editingId)); }
  else { ({ error } = await sb.from("isler").insert(taskToRow(data))); }
  btn.disabled=false;
  if(error){ alert("Kaydedilemedi: "+error.message); return; }
  closeModal(); await loadTasks();
}
async function deleteTask(){
  if(!editingId) return; if(!confirm("Bu işi silmek istiyor musun?")) return;
  const { error } = await sb.from("isler").delete().eq("id", editingId);
  if(error){ alert("Silinemedi: "+error.message); return; }
  closeModal(); await loadTasks();
}

/* people */
function openPeople(){ renderPeopleList(); document.getElementById("peopleOverlay").classList.add("show"); setTimeout(()=>document.getElementById("newPerson").focus(),50); }
function closePeople(){ document.getElementById("peopleOverlay").classList.remove("show"); }
function renderPeopleList(){
  const el=document.getElementById("peopleList2");
  if(!peopleRows.length){ el.innerHTML=`<div style="color:var(--text-3); font-size:13px; padding:8px 0;">Henüz kişi yok.</div>`; return; }
  el.innerHTML=peopleRows.slice().sort((a,b)=>a.ad.localeCompare(b.ad,"tr")).map(p=>`
    <div style="display:flex; align-items:center; justify-content:space-between; padding:8px 4px; border-bottom:1px solid var(--border);">
      <span style="font-size:14px;">${escapeHtml(p.ad)}${p.user_id?' <span style="color:var(--text-3);font-size:11px;">(üye)</span>':''}</span>
      <button class="icon-btn" title="Sil" onclick="removePerson('${p.id}')">&times;</button>
    </div>`).join("");
}
async function addPerson(){
  const inp=document.getElementById("newPerson"); const name=inp.value.trim(); if(!name) return;
  if(peopleRows.some(p=>p.ad.toLowerCase()===name.toLowerCase())){ inp.value=""; return; }
  const { error } = await sb.from("kisiler").insert({ ad:name });
  if(error){ alert("Eklenemedi: "+error.message); return; }
  inp.value=""; inp.focus(); await loadPeople(); renderPeopleList();
}
async function removePerson(id){
  const row=peopleRows.find(p=>p.id===id); if(!row) return;
  if(!confirm(`"${row.ad}" listeden silinsin mi? (İşlerdeki atama metni olduğu gibi kalır.)`)) return;
  const { error } = await sb.from("kisiler").delete().eq("id", id);
  if(error){ alert("Silinemedi: "+error.message); return; }
  await loadPeople(); renderPeopleList();
}

document.getElementById("overlay").addEventListener("click", e=>{ if(e.target.id==="overlay") closeModal(); });
document.getElementById("peopleOverlay").addEventListener("click", e=>{ if(e.target.id==="peopleOverlay") closePeople(); });
document.addEventListener("keydown", e=>{ if(e.key==="Escape"){ closeModal(); closePeople(); } });

boot();
</script>
</body>
</html>
